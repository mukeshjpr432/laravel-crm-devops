apiVersion: apps/v1
kind: Deployment

metadata:
  name: metrics-server
  namespace: kube-system
  labels:
    k8s-app: metrics-server

spec:
  selector:
    matchLabels:
      k8s-app: metrics-server

  template:
    metadata:
      labels:
        k8s-app: metrics-server

    spec:
      serviceAccountName: metrics-server

      containers:
      - name: metrics-server

        image: registry.k8s.io/metrics-server/metrics-server:v0.8.1

        args:
        - --cert-dir=/tmp
        - --secure-port=10250
        - --kubelet-insecure-tls
        - --kubelet-preferred-address-types=InternalIP
        - --kubelet-use-node-status-port
        - --metric-resolution=15s

        ports:
        - containerPort: 10250
          name: https
          protocol: TCP

---
apiVersion: v1
kind: Service

metadata:
  name: metrics-server
  namespace: kube-system

spec:
  selector:
    k8s-app: metrics-server

  ports:
  - port: 443
    targetPort: https

---
apiVersion: apiregistration.k8s.io/v1
kind: APIService

metadata:
  name: v1beta1.metrics.k8s.io

spec:
  service:
    name: metrics-server
    namespace: kube-system

  group: metrics.k8s.io
  version: v1beta1

  insecureSkipTLSVerify: true

  groupPriorityMinimum: 100
  versionPriority: 100