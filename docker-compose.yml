version: '3.8'

services:
  app:
    build: .
    container_name: krayin-crm
    ports:
      - "80:80"
    environment:
      APP_NAME: "Krayin CRM"
      APP_ENV: "production"
      APP_DEBUG: "false"
      APP_URL: "http://localhost"
      APP_KEY: "base64:Q22dL8mw4QhqAa7hrnoyXk3oED5IEgZpJihXpWqkh3E="
      DB_CONNECTION: "mysql"
      DB_HOST: "db"
      DB_PORT: "3306"
      DB_DATABASE: "laravel-crm"
      DB_USERNAME: "root"
      DB_PASSWORD: "root"
    volumes:
      - ./:/var/www/html
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    depends_on:
      - db
    networks:
      - crm-network
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: krayin-db
    environment:
      MYSQL_ROOT_PASSWORD: "root"
      MYSQL_DATABASE: "laravel-crm"
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - crm-network
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog
    container_name: krayin-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - crm-network
    restart: unless-stopped

volumes:
  db-data:

networks:
  crm-network:
    driver: bridge
