apiVersion: apps/v1
kind: Deployment

metadata:
  name: krayin-crm

spec:
  replicas: 2

  selector:
    matchLabels:
      app: krayin-crm

  template:
    metadata:
      labels:
        app: krayin-crm

    spec:
      containers:
      - name: krayin-crm

        image: krayin-crm:latest

        imagePullPolicy: Never

        ports:
        - containerPort: 80

        env:
        - name: APP_KEY
          valueFrom:
            secretKeyRef:
              name: crm-secret
              key: APP_KEY

        - name: DB_CONNECTION
          value: mysql

        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: crm-secret
              key: DB_HOST

        - name: DB_DATABASE
          valueFrom:
            secretKeyRef:
              name: crm-secret
              key: DB_DATABASE

        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: crm-secret
              key: DB_USERNAME

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: crm-secret
              key: DB_PASSWORD